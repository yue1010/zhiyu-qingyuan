<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>关于</title>
    <link rel="stylesheet" href="css/mine.css">
    <style>
        /* 主内容区统一布局 */
        .container {
            flex: 1;
            padding: 60px 15px 20px;
            background: #fff;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .container::-webkit-scrollbar {
            display: none;
        }

        /* 顶部导航栏 + 分割线 */
        .page-top {
            display: flex;
            align-items: center;
            padding: 10px 0;
            margin-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        /* SVG 返回箭头 */
        .back-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: #666;
        }
        .back-btn:active {
            transform: scale(0.9);
        }

        /* 你指定的标题样式 */
        .page-title-text {
            flex: 1;
            text-align: center;
            font-size: 22px;
            color: #24573f;
            font-weight: bold;
            letter-spacing: 2px;
            padding-right: 25px; 
        }

        /* 卡片统一样式，和收藏/设置页对齐 */
        .about-card {
            padding: 24px 20px;
            background: #f9fdf5;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-align: center;
            transition: all 0.2s ease;
            cursor: default;
        }
        .about-card:active {
            background: #f0f7e8;
            transform: scale(0.98);
        }

        .about-card h3 {
            font-size: 18px;
            color: #333;
            font-weight: 500;
        }

        .about-text {
            line-height: 1.8;
            color: #666;
            margin-top: 15px;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="phone-box">
        <div class="island"></div>

        <div class="container">
            <div class="page-top">
                <div class="back-btn" onclick="history.back()">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 11H7.414l4.293-4.293a1 1 0 0 0-1.414-1.414l-6 6a1 1 0 0 0 0 1.414l6 6a1 1 0 0 0 1.414-1.414L7.414 13H20a1 1 0 0 0 0-2z"/>
                    </svg>
                </div>
                <h2 class="page-title-text">关于智愈清源</h2>
                <span></span>
            </div>

            <div class="about-card">
                <h3>情绪治愈小助手</h3>
                <p class="about-text">
                    一款专注情绪记录、心情疏导的轻应用，
                    陪伴你记录每一天的喜怒哀乐，
                    用音乐与文字治愈内心。
                </p>
                <p style="margin-top:15px;color:#999;">版本：V2.0.0</p>
            </div>
        </div>
        <!-- 已移除底部导航栏 -->
    </div>
</body>
</html>
