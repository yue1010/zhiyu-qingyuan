<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智愈清源 - 音乐急救包</title>
    <link rel="stylesheet" href="./css/music.css">
</head>
<body>
    <div class="phone-box">
        <div class="island"></div>

        <!-- 主内容区 -->
        <div class="container">
            <h1 class="page-title">音乐急救包</h1>
            <p class="sub-title">此时此刻，你的心情更接近于？</p>

            <!-- 情绪卡片网格 -->
            <div class="emotion-grid">
                <div class="emotion-card anger" data-emotion="anger">
                    <div class="icon">🔥</div>
                    <div class="label">愤怒</div>
                </div>
                <div class="emotion-card anxiety" data-emotion="💨">
                    <div class="icon">💨</div>
                    <div class="label">焦虑</div>
                </div>
                <div class="emotion-card sad" data-emotion="sad">
                    <div class="icon">🌧️</div>
                    <div class="label">委屈</div>
                </div>
                <div class="emotion-card defeat" data-emotion="defeat">
                    <div class="icon">↩️</div>
                    <div class="label">挫败</div>
                </div>
                <div class="emotion-card calm" data-emotion="calm">
                    <div class="icon">🍃</div>
                    <div class="label">平静</div>
                </div>
                <div class="emotion-card relax" data-emotion="relax">
                    <div class="icon">🌊</div>
                    <div class="label">放松</div>
                </div>
                <div class="emotion-card heal" data-emotion="heal">
                    <div class="icon">✨</div>
                    <div class="label">治愈</div>
                </div>
                <div class="emotion-card peace" data-emotion="peace">
                    <div class="icon">🤍</div>
                    <div class="label">安心</div>
                </div>
            </div>
        </div>

        <!-- 音乐播放器弹窗 -->
        <div class="music-modal" id="musicModal">
            <div class="modal-content">
                <!-- 专辑封面 -->
                <div class="album-cover">
                    <div class="cover-bg"></div>
                </div>
                <!-- 歌曲信息 -->
                <div class="song-info">
                    <h2 class="song-title">Release Anger</h2>
                    <p class="song-artist">By: Meditation Hub</p>
                    <!-- 这里把tag和爱心放在同一行 -->
                    <div class="tag-like-row">
                        <span class="song-tag">释放愤怒</span>
                        <button class="like-btn" id="likeBtn">🤍</button>
                    </div>
                </div>
                <!-- 播放控制：上一首/播放/下一首 居中 -->
                <div class="player-controls">
                    <button class="prev-btn" id="prevBtn">◀◀</button>
                    <button class="play-btn" id="playBtn">▶</button>
                    <button class="next-btn" id="nextBtn">▶▶</button>
                </div>
                <!-- 进度条 -->
                <div class="progress-container">
                    <span class="time current-time">00:00</span>
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                    <span class="time total-time">03:20</span>
                </div>
                <!-- 关闭按钮 -->
                <button class="close-btn" id="closeBtn">关闭卡片</button>
            </div>
        </div>

        <!-- 底部导航 -->
<nav class="tab-bar">
