<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>善意转化坊</title>
    <link rel="stylesheet" href="css/music.css">
    <link rel="stylesheet" href="css/transform.css">
</head>
<body>
    <div class="phone-box">
        <div class="island"></div>

        <!-- 顶部标题 沿用 diary 样式 -->
        <div class="header-fixed">
            <h1 class="page-title">善意转化坊</h1>
            <p class="sub-title">将负面思绪，转化为温柔诗意</p>
        </div>

        <!-- 主内容区 -->
        <div class="container">
            <div class="visual-area">
                <div class="gradient-circle"></div>
                <div class="dot-ring"></div>
            </div>

            <div class="input-card">
                <label class="input-label">输入情绪关键词</label>
                <input type="text" id="emotion-input" class="emotion-input" placeholder="例如：焦虑、委屈、愤怒">
                <button id="transform-btn" class="transform-btn">开始转化</button>
            </div>
        </div>

        <!-- 底部导航 -->
<nav class="tab-bar">
    <a href="music.html" class="tab-item" data-page="music">
        <div class="icon-bg"></div>
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 18V5l12-2v13" />
            <circle cx="6" cy="18" r="3" />
            <circle cx="18" cy="16" r="3" />
        </svg>
    </a>
    <a href="comment.html" class="tab-item" data-page="comment">
        <div class="icon-bg"></div>
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
        </svg>
    </a>
    <a href="diary.html" class="tab-item" data-page="diary">
        <div class="icon-bg"></div>
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
        </svg>
    </a>
    <a href="transform.html" class="tab-item" data-page="transform">
    <div class="icon-bg"></div>
    <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
    </svg>
</a>
    <a href="mine.html" class="tab-item" data-page="mine">
        <div class="icon-bg"></div>
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
        </svg>
    </a>
</nav>

        <!-- 结果弹窗 仅在手机容器内生效，层级低于导航 -->
        <div id="result-modal" class="modal hidden">
            <div class="modal-mask"></div>
            <div class="modal-content">
                <button id="close-modal" class="close-modal">×</button>
                <h3 class="result-title">✨ 你的善意表达</h3>
                <p id="result-text" class="result-content"></p>
                <div class="result-actions">
                    <button id="copy-btn" class="action-btn copy-btn">复制文案</button>
                    <button id="share-btn" class="action-btn share-btn">分享</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/transform.js"></script>
</body>
</html>
