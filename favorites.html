<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的收藏</title>
    <link rel="stylesheet" href="css/mine.css">
    <style>
        /* 顶部导航栏 */
        .page-top {
            display: flex;
            align-items: center;
            padding: 0 10px;
            margin-bottom: 20px;
        }
        .back-btn {
            font-size: 24px;
            color: #24573f;
            cursor: pointer;
            padding: 5px 10px;
        }
        .page-title-text {
            flex: 1;
            text-align: center;
            font-size: 22px;
            color: #24573f;
        }

        /* 歌单条目样式 */
        .song-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .song-item:active {
            background: #f9fdf5;
        }
        /* 歌曲图标 */
        .song-icon {
            font-size: 26px;
            color: #673ab7; /* 紫色图标，和你设计稿一致 */
            margin-right: 14px;
        }
        /* 歌曲信息区域 */
        .song-info {
            flex: 1;
        }
        .song-name {
            font-size: 17px;
            color: #333;
            margin-bottom: 4px;
        }
        .song-desc {
            font-size: 13px;
            color: #999;
        }
        /* 播放/暂停标识 */
        .song-control {
            font-size: 18px;
            color: #999;
            transition: color 0.2s;
        }
        .song-control.playing {
            color: #bde978; /* 播放时变为主绿色 */
        }
    </style>
</head>
<body>
    <div class="phone-box">
        <div class="island"></div>

        <div class="container">
            <div class="page-top">
                <span class="back-btn" onclick="history.back()">‹</span>
                <h2 class="page-title-text">我的收藏</h2>
                <span></span>
            </div>

            <!-- 收藏歌单列表 -->
            <div class="song-item">
                <div class="song-icon">🎵</div>
                <div class="song-info">
                    <div class="song-name">晚风</div>
                    <div class="song-desc">舒缓轻音乐 | 放松心情</div>
                </div>
                <div class="song-control">▶</div>
            </div>

            <div class="song-item">
                <div class="song-icon">🎵</div>
                <div class="song-info">
                    <div class="song-name">春日序曲</div>
                    <div class="song-desc">纯音乐 | 治愈情绪</div>
                </div>
                <div class="song-control">▶</div>
            </div>

            <div class="song-item">
                <div class="song-icon">🎵</div>
                <div class="song-info">
                    <div class="song-name">安静时光</div>
                    <div class="song-desc">助眠曲目 | 缓解焦虑</div>
                </div>
                <div class="song-control">▶</div>
            </div>

            <div class="song-item">
                <div class="song-icon">🎵</div>
                <div class="song-info">
                    <div class="song-name">晴空</div>
                    <div class="song-desc">轻快旋律 | 赶走疲惫</div>
                </div>
                <div class="song-control">▶</div>
            </div>
        </div>

        <!-- 底部导航 -->
        <nav class="tab-bar">
            <a href="music.html" class="tab-item">
                <div class="tab-icon">🎵</div>
                <div class="tab-text">急救包</div>
            </a>
            <a href="comment.html" class="tab-item">
                <div class="tab-icon">💬</div>
                <div class="tab-text">模拟器</div>
            </a>
            <a href="diary.html" class="tab-item">
                <div class="tab-icon">📖</div>
                <div class="tab-text">情绪日记</div>
            </a>
            <a href="transform.html" class="tab-item">
                <div class="tab-icon">✨</div>
                <div class="tab-text">转化坊</div>
            </a>
            <a href="mine.html" class="tab-item active">
                <div class="tab-icon">👤</div>
                <div class="tab-text">我的</div>
            </a>
        </nav>
    </div>

    <script>
        // 获取所有歌曲条目
        const songControls = document.querySelectorAll('.song-control');

        songControls.forEach(control => {
            control.addEventListener('click', (e) => {
                // 阻止事件冒泡，防止点击整个条目也触发
                e.stopPropagation();

                if (control.classList.contains('playing')) {
                    // 暂停状态：变回播放图标 ▶
                    control.textContent = '▶';
                    control.classList.remove('playing');
                } else {
                    // 播放状态：变成暂停图标 ||，并设为绿色
                    control.textContent = '| |';
                    control.classList.add('playing');
                }
            });
        });
    </script>
</body>
</html>
