<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的</title>
    <link rel="stylesheet" href="css/music.css">
    <link rel="stylesheet" href="css/mine.css">
</head>
<body>
    <div class="phone-box">
        <div class="island"></div>

        <!-- 主内容区 -->
        <div class="container">
            <!-- 1. 个人信息区：头像在上，昵称在下 -->
            <div class="profile-section">
                <div class="avatar-wrap" id="avatarWrap">
                    <img src="image/10.jpg" alt="头像" class="avatar" id="avatar">
                    <div class="badge">100</div>
                </div>
                <h2 class="username" id="username">智愈小达人</h2>
            </div>

            <!-- 2. 数据看板 -->
            <div class="data-section">
                <div class="section-header">
                    <span class="star-icon">⭐</span>
                    <h3 class="section-title">数据看板</h3>
                </div>
                <p class="section-subtitle">你本周的心情指数为四星，保持得很棒~</p>

                <div class="progress-item">
                    <span class="label">平静</span>
                    <div class="progress-bar">
                        <div class="progress-fill calm"></div>
                    </div>
                    <span class="percent">46%</span>
                </div>
                <div class="progress-item">
                    <span class="label">治愈</span>
                    <div class="progress-bar">
                        <div class="progress-fill heal"></div>
                    </div>
                    <span class="percent">22%</span>
                </div>
                <div class="progress-item">
                    <span class="label">焦虑</span>
                    <div class="progress-bar">
                        <div class="progress-fill anxious"></div>
                    </div>
                    <span class="percent">18%</span>
                </div>
                <div class="progress-item">
                    <span class="label">其他</span>
                    <div class="progress-bar">
                        <div class="progress-fill other"></div>
                    </div>
                    <span class="percent">14%</span>
                </div>

                <div class="stats-summary">
                    累计治愈 12h · 已解锁音乐 8 首 · 连续打卡 3 天
                </div>
            </div>

            <!-- 3. 我的歌单 -->
            <div class="section-wrap">
                <h3 class="section-title">我的歌单</h3>
                <div class="list-item" onclick="location.href='favorites.html'">
                    <span class="icon">❤️</span>
                    <span class="text">我的收藏</span>
                    <span class="arrow">›</span>
                </div>
            </div>

            <!-- 4. 工具与数据 -->
            <div class="section-wrap">
                <h3 class="section-title">工具与数据</h3>
                <div class="list-item" onclick="location.href='reminder.html'">
                    <span class="icon">🔔</span>
                    <span class="text">提醒设置</span>
                    <span class="arrow">›</span>
                </div>
            </div>

            <!-- 5. 关于与反馈 -->
            <div class="section-wrap">
                <h3 class="section-title">关于与反馈</h3>
                <div class="list-item" onclick="location.href='about.html'">
                    <span class="icon">📄</span>
                    <span class="text">关于智愈清源</span>
                    <span class="arrow">›</span>
                </div>
                <div class="list-item" onclick="location.href='rate.html'">
                    <span class="icon">⭐</span>
                    <span class="text">给个好评</span>
                    <span class="arrow">›</span>
                </div>
                <div class="list-item" onclick="location.href='privacy.html'">
                    <span class="icon">🔒</span>
                    <span class="text">隐私政策 / 用户协议</span>
                    <span class="arrow">›</span>
                </div>
                <div class="list-item" onclick="location.href='feedback.html'">
                    <span class="icon">📣</span>
                    <span class="text">意见反馈</span>
                    <span class="arrow">›</span>
                </div>
                <!-- 6. 退出登录：独立灰色居中块 -->
            <div class="logout-wrap">
                <button class="logout-btn" id="logoutBtn">退出登录</button>
            </div>
            </div>
        </div>

        <!-- 底部导航 -->
        <nav class="tab-bar">
            <a href="music.html" class="tab-item" data-page="music">
                <div class="icon-bg"></div>
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M9 18V5l12-2v13" />
                    <circle cx="6" cy="18" r="3" />
                    <circle cx="18" cy="16" r="3" />
                </svg>
            </a>
            <a href="comment.html" class="tab-item" data-page="comment">
                <div class="icon-bg"></div>
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
                </svg>
            </a>
            <a href="diary.html" class="tab-item" data-page="diary">
                <div class="icon-bg"></div>
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
                </svg>
            </a>
            <a href="transform.html" class="tab-item" data-page="transform">
                <div class="icon-bg"></div>
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                </svg>
            </a>
            <a href="mine.html" class="tab-item" data-page="mine">
                <div class="icon-bg"></div>
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
            </a>
        </nav>

        <!-- 修改昵称弹窗 -->
        <div class="modal" id="nameModal">
            <div class="modal-content">
                <h3 class="modal-title">修改昵称</h3>
                <input type="text" id="newNameInput" class="modal-input" placeholder="请输入新昵称">
                <div class="modal-buttons">
                    <button class="modal-btn cancel" id="cancelNameBtn">取消</button>
                    <button class="modal-btn confirm" id="confirmNameBtn">确定</button>
                </div>
            </div>
        </div>

        <!-- 隐藏文件选择器（用于本地上传头像） -->
        <input type="file" id="avatarFile" accept="image/*" style="display: none;">

        <!-- 修改头像弹窗 -->
        <div class="modal" id="avatarModal">
            <div class="modal-content">
                <h3 class="modal-title">修改头像</h3>
                <p class="modal-tip">点击下方图片选择头像，或上传自定义头像</p>
                <div class="avatar-options">
                    <img src="image/10.jpg" class="avatar-option selected" alt="头像选项">
                    <img src="image/11.jpg" class="avatar-option" alt="头像选项">
                    <img src="image/12.jpg" class="avatar-option" alt="头像选项">
                    <div class="avatar-option upload" id="uploadBtn">+</div>
                </div>
                <div class="modal-buttons">
                    <button class="modal-btn cancel" id="cancelAvatarBtn">取消</button>
                    <button class="modal-btn confirm" id="confirmAvatarBtn">确定</button>
                </div>
            </div>
        </div>
        <!-- 退出登录确认弹窗：底部弹出式 -->
        <div class="modal modal-bottom" id="logoutModal">
            <div class="modal-content">
                <h3 class="modal-title">确定要退出登录吗？</h3>
                <div class="modal-buttons">
                    <button class="modal-btn cancel" id="cancelLogoutBtn">取消</button>
                    <button class="modal-btn confirm danger" id="doLogoutBtn">退出登录</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/mine.js"></script>
</body>
</html>
