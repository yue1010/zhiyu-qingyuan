<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>提醒设置</title>
    <link rel="stylesheet" href="css/mine.css">
    <style>
        /* 主内容区 与收藏页一致：左移、滚动、内边距 */
        .container {
            flex: 1;
            padding: 60px 15px 20px;
            background: #fff;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .container::-webkit-scrollbar {
            display: none;
        }

        /* 顶部导航栏 加底部分割线 */
        .page-top {
            display: flex;
            align-items: center;
            padding: 10px 0;
            margin-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        /* SVG 返回箭头 统一样式 */
        .back-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: #666;
        }
        .back-btn:active {
            transform: scale(0.9);
        }

        /* 页面标题 与收藏页完全一致 + 左移偏移 */
        .page-title-text {
            flex: 1;
            text-align: center;
            font-size: 22px;
            color: #24573f;
            font-weight: bold;
            letter-spacing: 2px;
            padding-right: 25px; 
        }

        /* 设置条目：统一卡片样式、背景、圆角、间距、点击反馈 */
        .set-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #f9fdf5;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .set-item:active {
            background: #f0f7e8;
            transform: scale(0.98);
        }

        /* 文字样式 */
        .set-item > span {
            font-size: 17px;
            color: #333;
            font-weight: 500;
        }

        /* 开关样式保留原有动画，仅配色沿用主色 */
        .switch {
            width: 46px;
            height: 24px;
            background: #ccc;
            border-radius: 24px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.3s ease;
        }
        .switch.open {
            background: #bde978;
        }
        .switch.open::after {
            left: 24px;
        }
    </style>
</head>
<body>
    <div class="phone-box">
        <div class="island"></div>

        <div class="container">
            <div class="page-top">
                <div class="back-btn" onclick="history.back()">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 11H7.414l4.293-4.293a1 1 0 0 0-1.414-1.414l-6 6a1 1 0 0 0 0 1.414l6 6a1 1 0 0 0 1.414-1.414L7.414 13H20a1 1 0 0 0 0-2z"/>
                    </svg>
                </div>
                <h2 class="page-title-text">提醒设置</h2>
                <span></span>
            </div>

            <div class="set-item">
                <span>每日打卡提醒</span>
                <div class="switch open"></div>
            </div>
            <div class="set-item">
                <span>情绪记录提醒</span>
                <div class="switch"></div>
            </div>
            <div class="set-item">
                <span>消息推送</span>
                <div class="switch open"></div>
            </div>
        </div>

    <script>
        const switches = document.querySelectorAll('.switch');
        switches.forEach(item => {
            item.addEventListener('click', function(e) {
                // 阻止条目点击事件冒泡
                e.stopPropagation();
                this.classList.toggle('open');
            });
        });
    </script>
</body>
</html>
