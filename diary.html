<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>情绪日记</title>
    <link rel="stylesheet" href="css/music.css">
    <link rel="stylesheet" href="css/diary.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="phone-box">
        <div class="island"></div>

        <!-- 固定在顶部的标题区域 -->
        <div class="header-fixed">
            <h1 class="page-title">情绪日记</h1>
            <p class="sub-title">记录每一天的心情变化</p>
        </div>

        <div class="container">
            <!-- 日历模块 -->
            <div class="calendar-section">
                <div class="calendar-header">
                    <button class="month-btn prev-btn">&lt;</button>
                    <h2 class="current-month">2026年6月</h2>
                    <button class="month-btn next-btn">&gt;</button>
                </div>
                <div class="calendar-weekdays">
                    <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
                </div>
                <div class="calendar-days" id="calendarDays"></div>
            </div>

            <!-- 情绪趋势模块 -->
            <div class="trend-section">
                <h3 class="trend-title">情绪趋势（近7日）</h3>
                <div class="trend-chart" style="height: 200px;">
                    <canvas id="emotionTrendChart"></canvas>
                </div>
            </div>

            <button class="add-btn" id="addDiaryBtn">+</button>
        </div>

        <!-- 底部导航 -->
<nav class="tab-bar">
    <a href="music.html" class="tab-item" data-page="music">
        <div class="icon-bg"></div>
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 18V5l12-2v13" />
            <circle cx="6" cy="18" r="3" />
            <circle cx="18" cy="16" r="3" />
        </svg>
    </a>
    <a href="comment.html" class="tab-item" data-page="comment">
        <div class="icon-bg"></div>
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
        </svg>
    </a>
    <a href="diary.html" class="tab-item" data-page="diary">
        <div class="icon-bg"></div>
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
        </svg>
    </a>
    <a href="transform.html" class="tab-item" data-page="transform">
    <div class="icon-bg"></div>
    <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
    </svg>
</a>
    <a href="mine.html" class="tab-item" data-page="mine">
        <div class="icon-bg"></div>
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
        </svg>
    </a>
</nav>

    <!-- 日记弹窗（全宽适配版） -->
    <div class="diary-modal" id="diaryModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">记录此刻心情</h3>
                <button class="close-modal-btn" id="closeModalBtn">×</button>
            </div>

            <div class="form-group">
                <input type="text" class="form-input" id="diaryTitle" placeholder="日记标题">
            </div>

            <div class="form-group date-group">
                <span class="date-label">记录日期：</span>
                <span class="date-value" id="diaryDate">2026-06-07</span>
            </div>

            <!-- 情绪选择：宽版两排三列 -->
            <div class="emotion-select">
                <button class="emotion-btn" data-emotion="happy">开心</button>
                <button class="emotion-btn active" data-emotion="calm">平静</button>
                <button class="emotion-btn" data-emotion="tired">疲惫</button>
                <button class="emotion-btn" data-emotion="anxious">焦虑</button>
                <button class="emotion-btn" data-emotion="wronged">委屈</button>
                <button class="emotion-btn" data-emotion="angry">愤怒</button>
            </div>

            <div class="form-group">
                <textarea class="form-textarea" id="diaryContent" placeholder="写下你的感受与情绪..."></textarea>
            </div>

            <div class="modal-buttons">
                <button class="cancel-btn" id="cancelBtn">取消</button>
                <button class="save-btn" id="saveBtn">保存</button>
            </div>
        </div>
    </div>

    <script src="js/diary.js"></script>
</body>
</html>
