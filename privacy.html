<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>隐私政策 & 用户协议</title>
    <link rel="stylesheet" href="css/mine.css">
    <style>
        /* 主内容区统一布局 */
        .container {
            flex: 1;
            padding: 60px 15px 20px;
            background: #fff;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .container::-webkit-scrollbar {
            display: none;
        }

        /* 顶部导航栏 + 分割线 */
        .page-top {
            display: flex;
            align-items: center;
            padding: 10px 0;
            margin-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        /* 统一SVG返回箭头 */
        .back-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: #666;
        }
        .back-btn:active {
            transform: scale(0.9);
        }

        /* 统一标题样式 */
        .page-title-text {
            flex: 1;
            text-align: center;
            font-size: 22px;
            color: #24573f;
            font-weight: bold;
            letter-spacing: 2px;
            padding-right: 25px;
        }

        /* 卡片统一样式 */
        .text-card {
            padding: 20px;
            background: #f9fdf5;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }
        .text-card:active {
            background: #f0f7e8;
            transform: scale(0.98);
        }

        .text-card p {
            color: #333;
            line-height: 1.8;
            font-size: 15px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="phone-box">
        <div class="island"></div>

        <div class="container">
            <div class="page-top">
                <div class="back-btn" onclick="history.back()">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 11H7.414l4.293-4.293a1 1 0 0 0-1.414-1.414l-6 6a1 1 0 0 0 0 1.414l6 6a1 1 0 0 0 1.414-1.414L7.414 13H20a1 1 0 0 0 0-2z"/>
                    </svg>
                </div>
                <h2 class="page-title-text">隐私政策 & 用户协议</h2>
                <span></span>
            </div>

            <div class="text-card">
                <p>1. 本应用仅用于个人情绪记录与疏导，所有数据仅保存在本地。</p>
                <p>2. 我们不会收集、泄露您的个人信息与日记内容。</p>
                <p>3. 使用本应用即表示您同意以上条款，请合理规范使用。</p>
                <p>4. 如有协议变更，将会在页面内进行公示。</p>
            </div>
        </div>
    </div>
</body>
</html>
