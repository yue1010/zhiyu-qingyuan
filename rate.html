<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>给个好评</title>
    <link rel="stylesheet" href="css/mine.css">
    <style>
        /* 顶部导航栏 */
        .page-top {
            display: flex;
            align-items: center;
            padding: 10px 0;
            margin-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        /* SVG 返回箭头 */
        .back-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: #666;
        }
        .back-btn:active {
            transform: scale(0.9);
        }
        .page-title-text {
        flex: 1;
        text-align: center;
        font-size: 22px;
        color: #24573f;
        font-weight: bold;
        letter-spacing: 2px;
        padding-right: 25px; /* 向左偏移，数值可按需微调 */
        }
        .rate-card {
            padding: 25px 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-align: center;
        }
        .rate-desc {
            color: #666;
            line-height: 1.7;
            font-size: 18px;
        }
        /* 星星容器 */
        .star-group {
            font-size: 40px;
            margin: 25px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        /* 用空心星星实现，初始灰色 */
        .star-item {
            color: #ccc;
            cursor: pointer;
            transition: color 0.2s ease;
            /* 使用空心星星字符，避免浏览器强制渲染为黄色 */
        }
        /* 选中后变为黄色实心 */
        .star-item.active {
            color: #ffc107;
        }
        .rate-btn {
            margin-top: 25px;
            padding: 15px 40px;
            background: #bde978;
            border: none;
            border-radius: 16px;
            color: #24573f;
            font-size: 18px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .rate-btn:active {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="phone-box">
        <div class="island"></div>

        <div class="container">
            <div class="page-top">
                <div class="back-btn" onclick="history.back()">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 11H7.414l4.293-4.293a1 1 0 0 0-1.414-1.414l-6 6a1 1 0 0 0 0 1.414l6 6a1 1 0 0 0 1.414-1.414L7.414 13H20a1 1 0 0 0 0-2z"/>
                    </svg>
                </div>
                <h2 class="page-title-text">给个好评</h2>
                <span></span>
            </div>

            <div class="rate-card">
                <p class="rate-desc">如果您喜欢本应用，不妨留下好评鼓励一下吧~</p>
                <div class="star-group">
                    <!-- 使用空心星星，初始灰色，点击后切换为实心黄色 -->
                    <span class="star-item">☆</span>
                    <span class="star-item">☆</span>
                    <span class="star-item">☆</span>
                    <span class="star-item">☆</span>
                    <span class="star-item">☆</span>
                </div>
                <button class="rate-btn" id="goStoreBtn">前往评价</button>
            </div>
        </div>
    </div>

    <script>
        const stars = document.querySelectorAll('.star-item');
        // 星级点击逻辑：点击当前星，前方全部点亮
        stars.forEach((star, idx) => {
            star.addEventListener('click', function () {
                stars.forEach((s, i) => {
                    if (i <= idx) {
                        s.classList.add('active');
                        // 点亮后替换为实心星星
                        s.textContent = '★';
                    } else {
                        s.classList.remove('active');
                        // 未点亮时保持空心星星
                        s.textContent = '☆';
                    }
                });
            });
        });

        // 前往应用商店
        document.getElementById('goStoreBtn').addEventListener('click', function () {
            alert('应用暂未上架应用商店，敬请期待~');
            // 替换下方链接即可真实跳转
            // window.location.href = "应用商店地址";
        });
    </script>
</body>
</html>
