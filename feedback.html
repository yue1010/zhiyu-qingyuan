<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>意见反馈</title>
    <link rel="stylesheet" href="css/mine.css">
    <style>
        .page-top {
            display: flex;
            align-items: center;
            padding: 0 10px;
            margin-bottom: 20px;
        }
        .back-btn {
            font-size: 24px;
            color: #24573f;
            cursor: pointer;
            padding: 5px 10px;
        }
        .page-title-text {
            flex: 1;
            text-align: center;
            font-size: 22px;
            color: #24573f;
        }
        .feedback-card {
            padding: 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .feedback-textarea {
            width: 100%;
            min-height: 140px;
            border: 1px solid #e8f5e8;
            border-radius: 10px;
            padding: 12px;
            font-size: 16px;
            background: #f9fdf5;
            resize: none;
            outline: none;
            /* 输入时边框高亮 */
            transition: border-color 0.2s;
        }
        .feedback-textarea:focus {
            border-color: #bde978;
        }
        .submit-btn {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #bde978;
            border: none;
            border-radius: 10px;
            color: #24573f;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .submit-btn:active {
            opacity: 0.9;
        }
        /* 提示弹窗样式 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="phone-box">
        <div class="island"></div>

        <div class="container">
            <div class="page-top">
                <span class="back-btn" onclick="history.back()">‹</span>
                <h2 class="page-title-text">意见反馈</h2>
                <span></span>
            </div>

            <div class="feedback-card">
                <textarea class="feedback-textarea" id="feedbackInput" placeholder="请输入你的问题、建议或反馈..."></textarea>
                <button class="submit-btn" id="submitBtn">提交反馈</button>
            </div>
        </div>

        <nav class="tab-bar">
            <a href="music.html" class="tab-item">
                <div class="tab-icon">🎵</div>
                <div class="tab-text">急救包</div>
            </a>
            <a href="comment.html" class="tab-item">
                <div class="tab-icon">💬</div>
                <div class="tab-text">模拟器</div>
            </a>
            <a href="diary.html" class="tab-item">
                <div class="tab-icon">📖</div>
                <div class="tab-text">情绪日记</div>
            </a>
            <a href="transform.html" class="tab-item">
                <div class="tab-icon">✨</div>
                <div class="tab-text">转化坊</div>
            </a>
            <a href="mine.html" class="tab-item active">
                <div class="tab-icon">👤</div>
                <div class="tab-text">我的</div>
            </a>
        </nav>
    </div>

    <!-- 提示弹窗 -->
    <div class="toast" id="toast"></div>

    <script>
        const feedbackInput = document.getElementById('feedbackInput');
        const submitBtn = document.getElementById('submitBtn');
        const toast = document.getElementById('toast');

        // 显示提示
        function showToast(msg) {
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);
        }

        // 提交反馈
        submitBtn.addEventListener('click', () => {
            const content = feedbackInput.value.trim();
            if (!content) {
                // 输入为空时提示
                showToast('请输入反馈内容');
                return;
            }

            // 模拟提交
            showToast('反馈提交成功，感谢您的建议！');
            // 提交成功后清空输入框
            feedbackInput.value = '';
        });
    </script>
</body>
</html>
